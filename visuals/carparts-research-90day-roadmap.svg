<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #0f2748; }
      .subtitle { font: 600 22px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .h { font: 800 25px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #10233f; }
      .body { font: 650 18px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #1f3349; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .blue { fill: #0f4c81; }
      .green { fill: #168245; }
      .orange { fill: #f28c18; }
      .red { fill: #df3229; }
      .soft-blue { fill: #e8f1fb; }
      .soft-green { fill: #e8f6ee; }
      .soft-orange { fill: #fff3df; }
      .soft-red { fill: #fff0ee; }
      .arrow { stroke: #0f4c81; stroke-width: 7; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#0f4c81"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="900" y="66" text-anchor="middle">カーパーツリサーチ 90日改善ロードマップ</text>
  <text class="subtitle" x="900" y="104" text-anchor="middle">赤字防止を先に作り、次に出品数を増やし、最後に売上を安定化する</text>

  <!-- Phase cards -->
  <g transform="translate(70,160)">
    <rect class="card" width="380" height="305"/>
    <rect x="0" y="0" width="380" height="58" rx="18" class="blue"/>
    <text x="190" y="38" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">0-2週間</text>
    <text class="h" x="32" y="100">守りを作る</text>
    <text class="body" x="32" y="144">・作業マニュアル整備</text>
    <text class="body" x="32" y="184">・価格監視MVP</text>
    <text class="body" x="32" y="224">・Sellsta CSV 10件テスト</text>
    <text class="body" x="32" y="264">・要確認キュー運用</text>
  </g>
  <path class="arrow" d="M470 312 H545"/>

  <g transform="translate(565,160)">
    <rect class="card" width="380" height="305"/>
    <rect x="0" y="0" width="380" height="58" rx="18" class="green"/>
    <text x="190" y="38" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">3-4週間</text>
    <text class="h" x="32" y="100">出品データ化</text>
    <text class="body" x="32" y="144">・AIタイトル/説明文</text>
    <text class="body" x="32" y="184">・Shipping Policy候補</text>
    <text class="body" x="32" y="224">・出品CSV生成</text>
    <text class="body" x="32" y="264">・既存出品突合</text>
  </g>
  <path class="arrow" d="M965 312 H1040"/>

  <g transform="translate(1060,160)">
    <rect class="card" width="380" height="305"/>
    <rect x="0" y="0" width="380" height="58" rx="18" class="orange"/>
    <text x="190" y="38" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">2か月目</text>
    <text class="h" x="32" y="100">売れる商品へ集中</text>
    <text class="body" x="32" y="144">・A/B/Cランク化</text>
    <text class="body" x="32" y="184">・Product Research活用</text>
    <text class="body" x="32" y="224">・外注を例外確認へ</text>
    <text class="body" x="32" y="264">・価格改定候補CSV</text>
  </g>
  <path class="arrow" d="M1460 312 H1518"/>

  <g transform="translate(1438,160)">
    <rect class="card" width="300" height="305"/>
    <rect x="0" y="0" width="300" height="58" rx="18" class="red"/>
    <text x="150" y="38" text-anchor="middle" font-size="28" font-weight="800" fill="#fff">3か月目</text>
    <text class="h" x="32" y="100">安定運用</text>
    <text class="body" x="32" y="144">・週次ダッシュボード</text>
    <text class="body" x="32" y="184">・低回転商品の整理</text>
    <text class="body" x="32" y="224">・Reports形式対応</text>
    <text class="body" x="32" y="264">・利益を見て拡大</text>
  </g>

  <!-- KPIs -->
  <g transform="translate(80,540)">
    <rect class="card" width="760" height="390"/>
    <text class="h" x="38" y="54">毎週見る数字</text>
    <g transform="translate(38,92)">
      <rect width="300" height="62" rx="14" class="soft-blue"/><text class="body" x="24" y="39">新規出品候補数</text>
      <text class="h" x="520" y="39" text-anchor="middle">増やす</text>
    </g>
    <g transform="translate(38,164)">
      <rect width="300" height="62" rx="14" class="soft-green"/><text class="body" x="24" y="39">Aランク候補比率</text>
      <text class="h" x="520" y="39" text-anchor="middle">上げる</text>
    </g>
    <g transform="translate(38,236)">
      <rect width="300" height="62" rx="14" class="soft-orange"/><text class="body" x="24" y="39">要確認滞留件数</text>
      <text class="h" x="520" y="39" text-anchor="middle">減らす</text>
    </g>
    <g transform="translate(38,308)">
      <rect width="300" height="62" rx="14" class="soft-red"/><text class="body" x="24" y="39">赤字/取扱終了候補</text>
      <text class="h" x="520" y="39" text-anchor="middle">早く処理</text>
    </g>
  </g>

  <!-- Operating model -->
  <g transform="translate(960,540)">
    <rect class="card" width="760" height="390"/>
    <text class="h" x="38" y="54">最終形: 人間が見る場所を絞る</text>
    <g transform="translate(60,105)">
      <rect width="190" height="90" rx="16" class="soft-blue" stroke="#0f4c81"/>
      <text class="body" x="95" y="38" text-anchor="middle">AI/自動化</text>
      <text class="small" x="95" y="65" text-anchor="middle">下調べ・候補出し</text>
    </g>
    <path class="arrow" d="M265 150 H350"/>
    <g transform="translate(365,105)">
      <rect width="190" height="90" rx="16" class="soft-orange" stroke="#f28c18"/>
      <text class="body" x="95" y="38" text-anchor="middle">人間</text>
      <text class="small" x="95" y="65" text-anchor="middle">例外・最終OK</text>
    </g>
    <path class="arrow" d="M570 150 H650"/>
    <g transform="translate(560,240)">
      <rect width="160" height="75" rx="16" class="soft-green" stroke="#168245"/>
      <text class="body" x="80" y="32" text-anchor="middle">CSV</text>
      <text class="small" x="80" y="57" text-anchor="middle">一括出品</text>
    </g>
    <g transform="translate(70,240)">
      <rect width="400" height="75" rx="16" fill="#fff" stroke="#cbd5e1"/>
      <text class="body" x="200" y="32" text-anchor="middle">削除・自動改定・自動停止はしない</text>
      <text class="small" x="200" y="57" text-anchor="middle">候補表示 → 人間確認 → 実行</text>
    </g>
  </g>

  <text class="subtitle" x="900" y="1010" text-anchor="middle">方針: まず守り、次に件数、最後に利益率と回転率で伸ばす</text>
</svg>
