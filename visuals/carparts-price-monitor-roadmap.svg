      .h3 { font: 700 21px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #132b4d; }
      .body { font: 600 18px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #1f3349; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #334155; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
