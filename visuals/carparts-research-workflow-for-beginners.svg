<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #0f2748; }
      .subtitle { font: 600 22px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .h { font: 800 25px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #10233f; }
      .body { font: 650 18px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #1f3349; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .tiny { font: 600 13px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #64748b; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .blue { fill: #0f4c81; }
      .green { fill: #168245; }
      .orange { fill: #f28c18; }
      .red { fill: #df3229; }
      .soft-blue { fill: #e8f1fb; }
      .soft-green { fill: #e8f6ee; }
      .soft-orange { fill: #fff3df; }
      .soft-red { fill: #fff0ee; }
      .arrow { stroke: #0f4c81; stroke-width: 8; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .thin { stroke: #94a3b8; stroke-width: 2; fill: none; }
      .check { fill: #168245; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#0f4c81"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="900" y="66" text-anchor="middle">初めてのパートさん向け カーパーツリサーチ作業工程</text>
  <text class="subtitle" x="900" y="104" text-anchor="middle">ゴール: 型番・価格・入数・基準セラー・要確認を正しく残し、赤字と仕入不可を防ぐ</text>

  <!-- top process -->
  <g transform="translate(55,150)">
    <g>
      <rect class="card" width="250" height="170"/>
      <circle class="blue" cx="38" cy="36" r="24"/><text x="38" y="45" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">1</text>
      <text class="h" x="75" y="43">基準店舗を見る</text>
      <rect x="45" y="74" width="118" height="68" rx="8" class="soft-blue" stroke="#9bb5cf"/>
      <rect x="61" y="90" width="86" height="8" rx="4" fill="#0f4c81"/>
      <rect x="61" y="108" width="70" height="8" rx="4" fill="#94a3b8"/>
      <rect x="61" y="126" width="94" height="8" rx="4" fill="#94a3b8"/>
      <circle cx="191" cy="108" r="31" fill="#fff" stroke="#0f4c81" stroke-width="6"/>
      <line x1="213" y1="130" x2="235" y2="151" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
      <text class="small" x="125" y="158" text-anchor="middle">売れている型番を探す</text>
    </g>
    <path class="arrow" d="M265 85 H315"/>

    <g transform="translate(330,0)">
      <rect class="card" width="250" height="170"/>
      <circle class="blue" cx="38" cy="36" r="24"/><text x="38" y="45" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">2</text>
      <text class="h" x="75" y="43">型番を抜き出す</text>
      <rect x="42" y="75" width="164" height="42" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="124" y="103" text-anchor="middle" font-size="25" font-weight="800" fill="#0f2748">72515-67H01</text>
      <path d="M63 141 h117" stroke="#168245" stroke-width="10" stroke-linecap="round"/>
      <text class="small" x="125" y="158" text-anchor="middle">完全一致が基本</text>
    </g>
    <path class="arrow" d="M595 85 H645"/>

    <g transform="translate(660,0)">
      <rect class="card" width="250" height="170"/>
      <circle class="blue" cx="38" cy="36" r="24"/><text x="38" y="45" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">3</text>
      <text class="h" x="75" y="43">モノタロウ検索</text>
      <rect x="45" y="75" width="150" height="74" rx="10" fill="#fff" stroke="#cbd5e1"/>
      <text x="120" y="105" text-anchor="middle" font-size="24" font-weight="800" fill="#df3229">モノタロウ</text>
      <circle cx="195" cy="116" r="29" fill="#fff" stroke="#0f4c81" stroke-width="6"/>
      <line x1="215" y1="138" x2="236" y2="157" stroke="#0f4c81" stroke-width="8" stroke-linecap="round"/>
      <text class="small" x="125" y="158" text-anchor="middle">商品ページURLを確認</text>
    </g>
    <path class="arrow" d="M925 85 H975"/>

    <g transform="translate(990,0)">
      <rect class="card" width="250" height="170"/>
      <circle class="green" cx="38" cy="36" r="24"/><text x="38" y="45" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">4</text>
      <text class="h" x="75" y="43">B/C/D列入力</text>
      <rect x="38" y="75" width="174" height="70" rx="6" fill="#fff" stroke="#94a3b8"/>
      <line x1="38" y1="98" x2="212" y2="98" class="thin"/>
      <line x1="82" y1="75" x2="82" y2="145" class="thin"/>
      <line x1="126" y1="75" x2="126" y2="145" class="thin"/>
      <line x1="170" y1="75" x2="170" y2="145" class="thin"/>
      <text class="small" x="60" y="92" text-anchor="middle">B</text>
      <text class="small" x="104" y="92" text-anchor="middle">C</text>
      <text class="small" x="148" y="92" text-anchor="middle">D</text>
      <text class="tiny" x="60" y="121" text-anchor="middle">URL</text>
      <text class="tiny" x="104" y="121" text-anchor="middle">税別</text>
      <text class="tiny" x="148" y="121" text-anchor="middle">入数</text>
      <text class="small" x="125" y="158" text-anchor="middle">E列は自動計算</text>
    </g>
    <path class="arrow" d="M1255 85 H1305"/>

    <g transform="translate(1320,0)">
      <rect class="card" width="250" height="170"/>
      <circle class="green" cx="38" cy="36" r="24"/><text x="38" y="45" text-anchor="middle" font-size="25" font-weight="800" fill="#fff">5</text>
      <text class="h" x="75" y="43">基準セラー確認</text>
      <rect x="40" y="74" width="135" height="72" rx="8" fill="#eef2ff" stroke="#9bb5cf"/>
      <text x="107" y="104" text-anchor="middle" font-size="24" font-weight="800" fill="#0f2748">eBay</text>
      <path d="M185 96 l35 35" stroke="#f28c18" stroke-width="10" stroke-linecap="round"/>
      <path d="M220 96 l-35 35" stroke="#f28c18" stroke-width="10" stroke-linecap="round"/>
      <text class="small" x="125" y="158" text-anchor="middle">H列にURL</text>
    </g>
  </g>

  <!-- second row -->
  <g transform="translate(200,410)">
    <g>
      <rect class="card" width="310" height="180"/>
      <circle class="orange" cx="42" cy="40" r="26"/><text x="42" y="50" text-anchor="middle" font-size="27" font-weight="800" fill="#fff">6</text>
      <text class="h" x="84" y="48">総額を比べる</text>
      <rect x="38" y="82" width="108" height="52" rx="8" fill="#fff7ed" stroke="#f28c18"/>
      <text class="body" x="92" y="115" text-anchor="middle">基準</text>
      <rect x="164" y="82" width="108" height="52" rx="8" fill="#eff6ff" stroke="#0f4c81"/>
      <text class="body" x="218" y="115" text-anchor="middle">自社</text>
      <text class="small" x="155" y="160" text-anchor="middle">商品価格 + 送料</text>
    </g>
    <path class="arrow" d="M325 90 H390"/>
    <g transform="translate(405,0)">
      <rect class="card" width="310" height="180"/>
      <circle class="orange" cx="42" cy="40" r="26"/><text x="42" y="50" text-anchor="middle" font-size="27" font-weight="800" fill="#fff">7</text>
      <text class="h" x="84" y="48">送料リスクを見る</text>
      <rect x="42" y="82" width="86" height="55" fill="#d99a52" stroke="#a66a2b"/>
      <path d="M42 82 L85 62 L128 82" fill="#e6b06c" stroke="#a66a2b"/>
      <line x1="85" y1="62" x2="85" y2="137" stroke="#a66a2b"/>
      <line x1="161" y1="134" x2="225" y2="65" stroke="#f6b72d" stroke-width="14"/>
      <circle cx="248" cy="110" r="29" fill="#e8f1fb" stroke="#0f4c81" stroke-width="5"/>
      <text class="small" x="155" y="160" text-anchor="middle">重い・大きい・長いは要確認</text>
    </g>
    <path class="arrow" d="M730 90 H795"/>
    <g transform="translate(810,0)">
      <rect class="card" width="310" height="180"/>
      <circle class="red" cx="42" cy="40" r="26"/><text x="42" y="50" text-anchor="middle" font-size="27" font-weight="800" fill="#fff">8</text>
      <text class="h" x="84" y="48">要確認を残す</text>
      <rect x="45" y="80" width="220" height="78" rx="8" fill="#fff" stroke="#cbd5e1"/>
      <circle class="red" cx="73" cy="105" r="10"/><rect x="94" y="98" width="138" height="12" rx="6" fill="#cbd5e1"/>
      <circle class="orange" cx="73" cy="132" r="10"/><rect x="94" y="126" width="116" height="12" rx="6" fill="#cbd5e1"/>
      <text class="small" x="155" y="160" text-anchor="middle">迷ったら止めてメモ</text>
    </g>
  </g>

  <!-- good checks / warnings -->
  <g transform="translate(70,660)">
    <rect class="card" width="800" height="330"/>
    <text class="h" x="40" y="50">作業で守る4つのルール</text>
    <g transform="translate(40,84)">
      <circle class="check" cx="14" cy="14" r="14"/><path d="M7 14 l5 6 l11 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text class="body" x="42" y="21">型番は完全一致を基本にする</text>
    </g>
    <g transform="translate(40,134)">
      <circle class="check" cx="14" cy="14" r="14"/><path d="M7 14 l5 6 l11 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text class="body" x="42" y="21">C列は税別価格、D列は入数を正確に入れる</text>
    </g>
    <g transform="translate(40,184)">
      <circle class="check" cx="14" cy="14" r="14"/><path d="M7 14 l5 6 l11 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text class="body" x="42" y="21">取扱終了・在庫切れ・納期未定は必ずメモ</text>
    </g>
    <g transform="translate(40,234)">
      <circle class="check" cx="14" cy="14" r="14"/><path d="M7 14 l5 6 l11 -14" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text class="body" x="42" y="21">基準セラー総額を下回らない</text>
    </g>
    <rect x="470" y="84" width="280" height="180" rx="16" class="soft-green" stroke="#168245" stroke-width="3"/>
    <text class="h" x="610" y="124" text-anchor="middle" fill="#168245">判断に迷ったら</text>
    <text class="body" x="610" y="170" text-anchor="middle">無理に進めない</text>
    <text class="body" x="610" y="210" text-anchor="middle">要確認メモを書く</text>
    <text class="body" x="610" y="250" text-anchor="middle">次の商品へ進む</text>
  </g>

  <g transform="translate(930,660)">
    <rect class="card" width="800" height="330"/>
    <text class="h" x="40" y="50">よくあるミスと防ぎ方</text>
    <g transform="translate(40,86)">
      <rect width="330" height="56" rx="12" class="soft-red"/>
      <text class="body" x="20" y="36">税込価格を入力する</text>
      <text class="small" x="365" y="36">→ 税別表示を確認</text>
    </g>
    <g transform="translate(40,151)">
      <rect width="330" height="56" rx="12" class="soft-red"/>
      <text class="body" x="20" y="36">2個入りを1個で入力</text>
      <text class="small" x="365" y="36">→ 入数欄を確認</text>
    </g>
    <g transform="translate(40,216)">
      <rect width="330" height="56" rx="12" class="soft-red"/>
      <text class="body" x="20" y="36">似た型番を同一扱い</text>
      <text class="small" x="365" y="36">→ 末尾まで照合</text>
    </g>
    <g transform="translate(455,86)">
      <rect width="290" height="186" rx="16" class="soft-orange" stroke="#f28c18" stroke-width="3"/>
      <text class="h" x="145" y="42" text-anchor="middle" fill="#b45309">要確認ワード</text>
      <text class="body" x="145" y="86" text-anchor="middle">取扱終了</text>
      <text class="body" x="145" y="123" text-anchor="middle">在庫切れ / 納期未定</text>
      <text class="body" x="145" y="160" text-anchor="middle">大型 / 重量不明</text>
    </g>
  </g>
</svg>
