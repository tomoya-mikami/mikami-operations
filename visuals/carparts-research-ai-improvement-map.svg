<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 48px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #0f2748; }
      .subtitle { font: 600 22px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .h { font: 800 25px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #10233f; }
      .body { font: 650 18px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #1f3349; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", sans-serif; fill: #475569; }
      .card { fill: #fff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .blue { fill: #0f4c81; }
      .green { fill: #168245; }
      .orange { fill: #f28c18; }
      .red { fill: #df3229; }
      .purple { fill: #5b5fc7; }
      .soft-blue { fill: #e8f1fb; }
      .soft-green { fill: #e8f6ee; }
      .soft-orange { fill: #fff3df; }
      .soft-red { fill: #fff0ee; }
      .soft-purple { fill: #f0efff; }
      .arrow { stroke: #0f4c81; stroke-width: 7; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 7 8; fill: none; marker-end: url(#arrowGray); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#0f4c81"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1100"/>
  <text class="title" x="900" y="66" text-anchor="middle">カーパーツリサーチ改善マップ</text>
  <text class="subtitle" x="900" y="104" text-anchor="middle">出品数を増やしながら、赤字・送料ミス・外注費・返品リスクを抑える仕組み</text>

  <!-- Current pain -->
  <g transform="translate(60,145)">
    <rect class="card" width="420" height="330"/>
    <text class="h" x="32" y="48">いま困っていること</text>
    <g transform="translate(32,78)">
      <rect width="350" height="42" rx="10" class="soft-red"/><text class="body" x="18" y="28">仕入価格が上がり赤字化</text>
    </g>
    <g transform="translate(32,132)">
      <rect width="350" height="42" rx="10" class="soft-red"/><text class="body" x="18" y="28">取扱終了・在庫切れを見落とす</text>
    </g>
    <g transform="translate(32,186)">
      <rect width="350" height="42" rx="10" class="soft-red"/><text class="body" x="18" y="28">Shipping Policyミスで送料赤字</text>
    </g>
    <g transform="translate(32,240)">
      <rect width="350" height="42" rx="10" class="soft-red"/><text class="body" x="18" y="28">出品外注費が件数に比例</text>
    </g>
  </g>

  <!-- System center -->
  <g transform="translate(560,145)">
    <rect class="card" width="680" height="330"/>
    <text class="h" x="340" y="48" text-anchor="middle">改善後の中核システム</text>
    <g transform="translate(45,82)">
      <rect width="185" height="90" rx="16" class="soft-blue" stroke="#0f4c81"/>
      <text class="body" x="92" y="35" text-anchor="middle">価格監視</text>
      <text class="small" x="92" y="64" text-anchor="middle">値上がり・終了</text>
    </g>
    <g transform="translate(250,82)">
      <rect width="185" height="90" rx="16" class="soft-green" stroke="#168245"/>
      <text class="body" x="92" y="35" text-anchor="middle">利益判定</text>
      <text class="small" x="92" y="64" text-anchor="middle">薄利・赤字検知</text>
    </g>
    <g transform="translate(455,82)">
      <rect width="185" height="90" rx="16" class="soft-orange" stroke="#f28c18"/>
      <text class="body" x="92" y="35" text-anchor="middle">送料Policy</text>
      <text class="small" x="92" y="64" text-anchor="middle">重量・サイズ候補</text>
    </g>
    <g transform="translate(45,205)">
      <rect width="185" height="90" rx="16" class="soft-purple" stroke="#5b5fc7"/>
      <text class="body" x="92" y="35" text-anchor="middle">AI補助</text>
      <text class="small" x="92" y="64" text-anchor="middle">型番・説明・入数</text>
    </g>
    <g transform="translate(250,205)">
      <rect width="185" height="90" rx="16" fill="#fff" stroke="#0f4c81"/>
      <text class="body" x="92" y="35" text-anchor="middle">CSV生成</text>
      <text class="small" x="92" y="64" text-anchor="middle">Sellsta / Reports</text>
    </g>
    <g transform="translate(455,205)">
      <rect width="185" height="90" rx="16" fill="#fff" stroke="#168245"/>
      <text class="body" x="92" y="35" text-anchor="middle">候補リスト</text>
      <text class="small" x="92" y="64" text-anchor="middle">人間が最終判断</text>
    </g>
  </g>

  <!-- Results -->
  <g transform="translate(1320,145)">
    <rect class="card" width="420" height="330"/>
    <text class="h" x="32" y="48">目指す状態</text>
    <g transform="translate(32,78)">
      <rect width="350" height="42" rx="10" class="soft-green"/><text class="body" x="18" y="28">赤字になる前に見つかる</text>
    </g>
    <g transform="translate(32,132)">
      <rect width="350" height="42" rx="10" class="soft-green"/><text class="body" x="18" y="28">出品候補がA/B/Cで並ぶ</text>
    </g>
    <g transform="translate(32,186)">
      <rect width="350" height="42" rx="10" class="soft-green"/><text class="body" x="18" y="28">外注は例外確認へ移行</text>
    </g>
    <g transform="translate(32,240)">
      <rect width="350" height="42" rx="10" class="soft-green"/><text class="body" x="18" y="28">出品数と利益を両方伸ばす</text>
    </g>
  </g>

  <path class="arrow" d="M500 310 H540"/>
  <path class="arrow" d="M1260 310 H1300"/>

  <!-- AI tasks -->
  <g transform="translate(60,540)">
    <rect class="card" width="540" height="430"/>
    <text class="h" x="32" y="48">AIを入れると効く場所</text>
    <g transform="translate(32,85)">
      <circle class="purple" cx="18" cy="18" r="18"/><text x="18" y="25" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">AI</text>
      <text class="body" x="52" y="24">型番候補を抽出</text>
    </g>
    <g transform="translate(32,140)">
      <circle class="purple" cx="18" cy="18" r="18"/><text x="18" y="25" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">AI</text>
      <text class="body" x="52" y="24">モノタロウ商品との一致度判定</text>
    </g>
    <g transform="translate(32,195)">
      <circle class="purple" cx="18" cy="18" r="18"/><text x="18" y="25" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">AI</text>
      <text class="body" x="52" y="24">入数・左右セットを読み取り</text>
    </g>
    <g transform="translate(32,250)">
      <circle class="purple" cx="18" cy="18" r="18"/><text x="18" y="25" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">AI</text>
      <text class="body" x="52" y="24">タイトル・説明文案を生成</text>
    </g>
    <g transform="translate(32,305)">
      <circle class="purple" cx="18" cy="18" r="18"/><text x="18" y="25" text-anchor="middle" font-size="18" font-weight="800" fill="#fff">AI</text>
      <text class="body" x="52" y="24">重量/サイズの候補を出す</text>
    </g>
    <rect x="32" y="360" width="460" height="46" rx="12" class="soft-orange"/>
    <text class="body" x="262" y="390" text-anchor="middle">AIは「確定」ではなく「候補」まで</text>
  </g>

  <!-- Listing pipeline -->
  <g transform="translate(650,540)">
    <rect class="card" width="500" height="430"/>
    <text class="h" x="32" y="48">一括出品・外注費削減の流れ</text>
    <g transform="translate(55,92)">
      <rect width="390" height="58" rx="14" class="soft-blue"/>
      <text class="body" x="195" y="37" text-anchor="middle">リサーチ入力</text>
    </g>
    <path class="arrow" d="M250 158 V190"/>
    <g transform="translate(55,200)">
      <rect width="390" height="58" rx="14" class="soft-purple"/>
      <text class="body" x="195" y="37" text-anchor="middle">AIでタイトル・説明・Policy候補</text>
    </g>
    <path class="arrow" d="M250 266 V298"/>
    <g transform="translate(55,308)">
      <rect width="390" height="58" rx="14" class="soft-green"/>
      <text class="body" x="195" y="37" text-anchor="middle">出品OKだけCSV出力</text>
    </g>
    <text class="small" x="250" y="405" text-anchor="middle">Sellsta CSV / Seller Hub Reports形式へ変換</text>
  </g>

  <!-- Risk controls -->
  <g transform="translate(1200,540)">
    <rect class="card" width="540" height="430"/>
    <text class="h" x="32" y="48">リスクと回避策</text>
    <g transform="translate(32,84)">
      <rect width="205" height="58" rx="12" class="soft-red"/><text class="body" x="102" y="37" text-anchor="middle">型番違い</text>
      <text class="body" x="282" y="37">→ 完全一致/要確認</text>
    </g>
    <g transform="translate(32,154)">
      <rect width="205" height="58" rx="12" class="soft-red"/><text class="body" x="102" y="37" text-anchor="middle">送料赤字</text>
      <text class="body" x="282" y="37">→ Policy候補/重量確認</text>
    </g>
    <g transform="translate(32,224)">
      <rect width="205" height="58" rx="12" class="soft-red"/><text class="body" x="102" y="37" text-anchor="middle">仕入不可</text>
      <text class="body" x="282" y="37">→ 取扱状態監視</text>
    </g>
    <g transform="translate(32,294)">
      <rect width="205" height="58" rx="12" class="soft-red"/><text class="body" x="102" y="37" text-anchor="middle">大量誤出品</text>
      <text class="body" x="282" y="37">→ 10件テスト後拡大</text>
    </g>
    <rect x="32" y="370" width="456" height="40" rx="12" class="soft-green"/>
    <text class="body" x="260" y="397" text-anchor="middle">削除・自動改定・自動停止はしない</text>
  </g>

  <!-- Roadmap -->
  <g transform="translate(120,1000)">
    <text class="body" x="0" y="0">最短順: 価格監視 → 入力品質統一 → Sellsta CSVテスト → 出品CSV自動生成 → 既存出品見直し → 売上ダッシュボード</text>
  </g>
</svg>
